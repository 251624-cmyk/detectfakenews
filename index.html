<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가짜뉴스 판별 게임</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:420px;
    max-width:95%;
}

.card{
    background:white;
    border-radius:18px;
    padding:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    transition:.3s;
}

.card.correct{
    border:4px solid #2ecc71;
    background:#eafaf1;
}

.card.wrong{
    border:4px solid #e74c3c;
    background:#fdecea;
}

img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:12px;
    margin-bottom:15px;
}

h2{
    font-size:22px;
    line-height:1.5;
    margin-bottom:20px;
}

.buttons{
    display:flex;
    gap:10px;
}

button{
    flex:1;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:17px;
    cursor:pointer;
    font-weight:bold;
}

#realBtn{
    background:#3498db;
    color:white;
}

#fakeBtn{
    background:#e74c3c;
    color:white;
}

button:hover{
    opacity:.9;
}

button:disabled{
    opacity:.6;
    cursor:default;
}

#reason{
    display:none;
    margin-top:20px;
    line-height:1.6;
}

#nextBtn{
    width:100%;
    margin-top:20px;
    background:#222;
    color:white;
    display:none;
}

.score{
    text-align:center;
}

.score h1{
    margin-bottom:15px;
}
</style>
</head>

<body>

<div class="container">

<div class="card" id="card">

<div id="imageArea"></div>

<h2 id="headline"></h2>

<div class="buttons">
<button id="realBtn">진짜</button>
<button id="fakeBtn">가짜</button>
</div>

<div id="reason"></div>

<button id="nextBtn">다음 문제</button>

</div>

</div>

<script>

const newsData = [

{
headline:"KBO 경기 중 한화 김서현-두산 조인성 맞대결 영상 화제",
isFake:true,
reason:"조인성은 2017년 은퇴했고 김서현은 2023년 입단하여 실제로 맞대결이 불가능합니다.",
image:"photo_baseball.jpg"
},

{
headline:"콜라 마시면 북극곰 돼.. 동물학자 논란",
isFake:true,
reason:"콜라를 마신다고 북극곰이 되는 것은 생물학적으로 불가능한 허위 주장입니다.",
image:"photo_polarbear.jpg"
},

{
headline:"두더지.. 사람도 잡아먹는 최상위 포식자",
isFake:true,
reason:"두더지가 사람을 사냥하거나 잡아먹는다는 근거는 없습니다.",
image:"photo_dodoeshe.jpg"
}

];

let current=0;
let score=0;

const card=document.getElementById("card");
const headline=document.getElementById("headline");
const imageArea=document.getElementById("imageArea");
const reason=document.getElementById("reason");

const realBtn=document.getElementById("realBtn");
const fakeBtn=document.getElementById("fakeBtn");
const nextBtn=document.getElementById("nextBtn");

function loadQuestion(){

card.className="card";

reason.style.display="none";
nextBtn.style.display="none";

realBtn.disabled=false;
fakeBtn.disabled=false;

const q=newsData[current];

headline.textContent=q.headline;

if(q.image){
imageArea.innerHTML='<img src="'+q.image+'" alt="">';
}else{
imageArea.innerHTML='';
}

}

function check(userAnswer){

realBtn.disabled=true;
fakeBtn.disabled=true;

const q=newsData[current];

const correct=(userAnswer===q.isFake);

if(correct){
score++;
card.classList.add("correct");
reason.innerHTML="<b>정답!</b><br><br>"+q.reason;
}else{
card.classList.add("wrong");
reason.innerHTML="<b>오답!</b><br><br>"+q.reason;
}

reason.style.display="block";
nextBtn.style.display="block";

}

realBtn.onclick=function(){
check(false);
};

fakeBtn.onclick=function(){
check(true);
};

nextBtn.onclick=function(){

current++;

if(current>=newsData.length){

card.innerHTML=
'<div class="score">'+
'<h1>🎉 게임 종료!</h1>'+
'<h2>3문제 중 '+score+'문제를 맞혔습니다.</h2>'+
'<br><button onclick="location.reload()">다시 하기</button>'+
'</div>';

return;

}

loadQuestion();

};

loadQuestion();

</script>

</body>
</html>
